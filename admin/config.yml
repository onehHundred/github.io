# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: onehHundred/github.io
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/6f5c6cd5-ebe1-4788-a59d-0743ec0269f8/pkce
  auth_token_endpoint: /sites/6f5c6cd5-ebe1-4788-a59d-0743ec0269f8/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://github.com

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "zh_Hant"

collections:
  - name: "site"
    label: "網站內容"
    files:
      - file: "data/site.json"
        label: "網站設定"
        name: "site"
        fields:
          - label: "首頁區塊"
            name: "hero"
            widget: object
            fields:
              - { label: "小標籤（英文）", name: "eyebrow", widget: string }
              - { label: "主標題", name: "title", widget: string }
              - { label: "說明文字", name: "lead", widget: text }
              - { label: "主要按鈕文字", name: "cta_primary", widget: string }
              - { label: "次要按鈕文字", name: "cta_secondary", widget: string }

          - label: "代購流程"
            name: "steps"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "步驟標題", name: "title", widget: string }
              - { label: "步驟說明", name: "description", widget: text }

          - label: "商品"
            name: "products"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "上架顯示（關閉就不會出現在網站上）", name: "enabled", widget: boolean, default: true }
              - { label: "分類標籤（英文，例如 BEAUTY）", name: "category", widget: string }
              - { label: "商品名稱", name: "name", widget: string }
              - { label: "商品照片", name: "photo", widget: image, required: false }
              - { label: "價格（例：NT$ 850）", name: "price", widget: string }
              - { label: "預估到貨時間（例：7–10 個工作天）", name: "eta", widget: string }

          - label: "下單前須知"
            name: "notes"
            widget: list
            field: { label: "項目內容", name: "item", widget: string }

          - label: "聯絡方式"
            name: "contact"
            widget: list
            summary: "{{fields.platform}}"
            fields:
              - { label: "啟用（關閉就不會出現在網站上）", name: "enabled", widget: boolean, default: true }
              - { label: "平台名稱（例：INSTAGRAM／LINE／FACEBOOK）", name: "platform", widget: string }
              - { label: "帳號 / ID", name: "handle", widget: string }
              - { label: "備註說明", name: "note", widget: string }
